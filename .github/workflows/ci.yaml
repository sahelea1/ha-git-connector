---
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  addon-lint:
    name: Add-on linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: "./gitlab_config_sync"

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run yamllint
        uses: frenck/action-yamllint@v1

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./gitlab_config_sync/Dockerfile

  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Byte-compile
        run: python -m compileall -q gitlab_config_sync/app
      - name: Lint with Ruff
        run: ruff check gitlab_config_sync/app
